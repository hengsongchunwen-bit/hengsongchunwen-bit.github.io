<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>廖　春文</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Arial', sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f4f4f4;
    }
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 0;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    nav {
      background-color: #333;
      padding: 10px 0;
      text-align: center;
    }
    nav a {
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      display: inline-block;
      margin: 0 10px;
      border-radius: 5px;
      transition: background-color 0.3s;
    }
    nav a:hover {
      background-color: #667eea;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      color: #667eea;
      margin-bottom: 20px;
    }
    p {
      margin-bottom: 15px;
      font-size: 16px;
    }
    .counter {
      text-align: center;
      margin-top: 30px;
      padding: 15px;
      background-color: #f0f0f0;
      border-radius: 5px;
      border-left: 4px solid #667eea;
    }
    .counter p {
      font-size: 14px;
      color: #666;
      margin-bottom: 5px;
    }
    .counter-number {
      font-size: 28px;
      font-weight: bold;
      color: #667eea;
    }
    footer {
      text-align: center;
      padding: 20px;
      background-color: #333;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>ようこそ！</h1>
    <p>廖　春文</p>
  </header>

  <nav>
    <a href="index.html">ホーム</a>
    <a href="about.html">自己紹介</a>
    <a href="links.html">リンク集</a>
  </nav>

  <div class="container">
    <h1>👋 ようこそ　廖　春文のHPへ</h1>
    <p>このサイトへお越しいただき、ありがとうございます。</p>
    <p>JCN副主事の廖です。</p>
    <p>このサイトでは、自己紹介やリンク集をご紹介しています。</p>
    <p>各ページをご覧ください。</p>
    
    <div class="counter">
      <p>このページへのアクセス数：</p>
      <div class="counter-number" id="pageViews">0</div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 廖　春文 - All Rights Reserved</p>
  </footer>

  <script>
    // ページロード時にアクセス数をカウント
    window.addEventListener('load', function() {
      // localStorageからアクセス数を取得（なければ0）
      let views = localStorage.getItem('pageViews');
      
      if (views === null) {
        views = 0;
      } else {
        views = parseInt(views);
      }
      
      // アクセス数をインクリメント
      views++;
      
      // localStorageに保存
      localStorage.setItem('pageViews', views);
      
      // ページに表示
      document.getElementById('pageViews').textContent = views;
    });
  </script>
</body>
</html>
