<script>
document.addEventListener("DOMContentLoaded", function() {
  try {
    let visitCount = localStorage.getItem('visitCount_about');

    if (visitCount === null) {
      visitCount = 1;
    } else {
      visitCount = Number(visitCount) + 1;
    }

    localStorage.setItem('visitCount_about', visitCount);

    const el = document.getElementById('visitCount');
    if (el) {
      el.textContent = visitCount;
    } else {
      console.log("visitCount要素が見つからない");
    }

  } catch (e) {
    console.error("localStorageが使えません:", e);

    // fallback（最低限表示）
    const el = document.getElementById('visitCount');
    if (el) {
      el.textContent = "取得不可";
    }
  }
});
</script>
