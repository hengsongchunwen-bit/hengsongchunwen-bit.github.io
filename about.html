<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介 - 廖　春文</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Arial', sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f4f4f4;
    }
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 0;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    nav {
      background-color: #333;
      padding: 10px 0;
      text-align: center;
    }
    nav a {
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      display: inline-block;
      margin: 0 10px;
      border-radius: 5px;
      transition: background-color 0.3s;
    }
    nav a:hover {
      background-color: #667eea;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .profile {
      text-align: center;
      margin-bottom: 30px;
    }
    .profile img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 5px solid #667eea;
      object-fit: cover;
    }
    h1 {
      color: #667eea;
      margin-bottom: 10px;
    }
    .title {
      font-size: 20px;
      color: #764ba2;
      margin-bottom: 20px;
    }
    .info-section {
      margin: 20px 0;
      padding: 15px;
      background-color: #f9f9f9;
      border-left: 4px solid #667eea;
    }
    .info-section h2 {
      color: #667eea;
      font-size: 18px;
      margin-bottom: 10px;
    }
    footer {
      text-align: center;
      padding: 20px;
      background-color: #333;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>自己紹介</h1>
  </header>

  <nav>
    <a href="index.html">ホーム</a>
    <a href="about.html">自己紹介</a>
    <a href="links.html">リンク集</a>
  </nav>

<div style="text-align:center; margin-bottom:20px; font-size:18px; font-weight:bold; color:#667eea;">
  🎯 このページのアクセス数：<span id="visitCount">0</span> 回
</div>

  <div class="container">
    <div class="profile">
      <img src="https://images.unsplash.com/photo-1587925591897-27307b66bd5e?w=400&h=400&fit=crop" alt="プロフィール画像">
      <h1>廖春文</h1>
      <p class="title">JCN 副主事</p>
    </div>

    <div class="info-section">
      <h2>📝 プロフィール</h2>
      <p>JCNの副主事として、日々業務に取り組んでいます。</p>
    </div>

    <div class="info-section">
      <h2>✈️ 興味・趣味</h2>
      <p>旅行が大好きです！様々な場所を訪れ、新しい文化や風景を体験することが楽しみです。</p>
    </div>

    <div class="info-section">
      <h2>💼 経歴</h2>
      <p>JCNでの経験を通じて、多くのスキルと知識を習得してきました。</p>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 横松 - All Rights Reserved</p>
  </footer>
<script>
document.addEventListener("DOMContentLoaded", function() {
  let visitCount = localStorage.getItem('visitCount_about');

  if (!visitCount) {
    visitCount = 1;
  } else {
    visitCount = parseInt(visitCount) + 1;
  }

  localStorage.setItem('visitCount_about', visitCount);

  const el = document.getElementById('visitCount');
  if (el) {
    el.textContent = visitCount;
  } else {
    console.error("visitCount要素が見つかりません");
  }
});
</script>

</body>
</html>
