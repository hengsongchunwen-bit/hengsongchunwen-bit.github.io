<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介 - 廖　春文</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f4f4f4;
    }
    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 20px 0;
      text-align: center;
    }
    nav {
      background-color: #333;
      padding: 10px 0;
      text-align: center;
    }
    nav a {
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      display: inline-block;
      margin: 0 10px;
      border-radius: 5px;
    }
    nav a:hover { background-color: #667eea; }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 40px;
      border-radius: 10px;
    }

    .profile { text-align: center; margin-bottom: 30px; }

    .profile img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 5px solid #667eea;
      object-fit: cover;
    }

    .counter {
      text-align:center;
      margin:20px 0;
      font-size:18px;
      font-weight:bold;
      color:#667eea;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #333;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <h1>自己紹介</h1>
</header>

<nav>
  <a href="index.html">ホーム</a>
  <a href="about.html">自己紹介</a>
  <a href="links.html">リンク集</a>
</nav>

<div class="container">

  <div class="counter">
    🎯 このページのアクセス数：<span id="visitCount">0</span> 回
  </div>

  <div class="profile">
    <img src="https://images.unsplash.com/photo-1587925591897-27307b66bd5e?w=400&h=400&fit=crop">
    <h1>廖春文</h1>
    <p>JCN 副主事</p>
  </div>

</div>

<footer>
  <p>&copy; 2026 横松 - All Rights Reserved</p>
</footer>

<script>
function updateCounter() {
  const el = document.getElementById("visitCount");
  if (!el) return;

  // localStorage確認
  if (!window.localStorage) {
    el.textContent = "未対応";
    return;
  }

  let count = localStorage.getItem("visitCount_about");

  if (!count) {
    count = 1;
  } else {
    count = parseInt(count) + 1;
  }

  localStorage.setItem("visitCount_about", count);
  el.textContent = count;
}

// 確実に実行
window.onload = updateCounter;
</script>

</body>
</html>
